  .ad-badge{position:absolute;top:16px;right:16px;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.25);padding:3px 8px;border-radius:999px}
  .ad-art{position:relative;width:170px;height:170px;border-radius:24px;margin-bottom:24px;
    background:linear-gradient(135deg,#7C3AED,#A855F7 55%,#EC4899);display:flex;align-items:center;justify-content:center;overflow:hidden;
    box-shadow:0 20px 50px -16px rgba(124,58,237,.8)}
  .ad-art-glow{position:absolute;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.35),transparent 60%);
    top:-60px;left:-40px;animation:adfloat 3s ease-in-out infinite}
  @keyframes adfloat{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,24px)}}
  .ad-art-mark{position:relative;font-size:54px;font-weight:800;color:#fff;letter-spacing:-.04em;text-shadow:0 4px 14px rgba(0,0,0,.25)}
  .ad-copy{font-size:17px;font-weight:700;margin-bottom:16px}
  .ad-bar{width:160px;height:5px;border-radius:999px;background:rgba(255,255,255,.18);overflow:hidden}
  .ad-bar > i{display:block;height:100%;width:0;background:#fff;border-radius:999px;transition:width 3s linear}
  .ad-foot{position:absolute;bottom:22px;left:0;right:0;font-size:11.5px;color:rgba(255,255,255,.55);padding:0 30px}
  .g-hero{padding:26px 22px 20px;background:linear-gradient(160deg,#7C3AED,#5B21B6);color:#fff;position:relative;overflow:hidden}
  .g-hero::after{content:"";position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.08);top:-70px;right:-50px}
  .g-hero .ev-title{font-size:23px;font-weight:800;letter-spacing:-.02em;margin:10px 0 2px;position:relative}
  .g-hero .ev-meta{font-size:13.5px;opacity:.92;position:relative}
  .g-amt{position:relative;margin-top:16px;display:flex;align-items:baseline;gap:7px}
  .g-amt b{font-size:32px;font-weight:800;letter-spacing:-.03em}
  .g-amt span{font-size:13px;opacity:.85}
  .g-body{padding:20px 22px 30px}
  .qcard{margin-bottom:16px}
  .qcard .qp{font-size:14.5px;font-weight:700;margin-bottom:9px}
  .choices{display:flex;flex-direction:column;gap:8px}
  .choices.single .tick{border-radius:50%}
  .choice{padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;background:#fff;font-size:14px;font-weight:600;color:var(--ink-soft);text-align:left;transition:.15s;display:flex;align-items:center;gap:10px}
  .choice .tick{width:18px;height:18px;border-radius:6px;border:2px solid var(--line);flex:none}
  .choice.on{border-color:var(--violet);background:var(--violet-soft);color:var(--violet-deep)}
  .choice.on .tick{border-color:var(--violet);background:var(--violet);box-shadow:inset 0 0 0 3px #fff}
  .guest-id{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:18px}
  .full-screen,.conf-screen{padding:60px 28px;text-align:center;min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .check{width:74px;height:74px;border-radius:50%;background:var(--good-soft);display:flex;align-items:center;justify-content:center;margin-bottom:18px}
  .check svg{width:36px;height:36px}
  .conf-title{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
  .conf-sub{color:var(--ink-soft);font-size:14.5px;margin-bottom:22px}
  .receipt{width:100%;background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;text-align:left;font-size:13.5px}
  .receipt .ln{display:flex;justify-content:space-between;padding:5px 0;color:var(--ink-soft)}
  .receipt .ln b{color:var(--ink)}
  .spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:-4px;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .lock{font-size:12px;color:var(--muted);text-align:center;margin-top:12px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;opacity:0;transition:.3s;z-index:99;box-shadow:var(--shadow)}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

  @media (max-width:820px){.grid2{grid-template-columns:1fr}.share{position:static}.stat-grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}.wrap{padding:22px 14px 70px}}
</style>
</head>

    <div class="role-switch" id="roleSwitch">
      <button data-view="create" class="on">Host</button>
      <button data-view="dash">Dashboard</button>
      <button data-view="guest">Guest phone</button>
    </div>
  </div>
  <div class="wrap" id="app"></div>
  <div class="toast" id="toast"></div>

<script>
/* =========================================================
   Virea - single-file demo (school FinTech MVP)
   No real money. Host + Guest + Dashboard share live state.
   ========================================================= */
const App = {
  view:'create', event:null, attendances:[], guestStep:'view',
  guestDraft:{name:'',answers:{},chosen:null,verified:false}, pollTimer:null,
};
const $ = (s,r=document)=>r.querySelector(s);
const el = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstChild;};
const euros = c => '€'+(c/100).toFixed(2).replace('.00','');
const fmtDate = (iso,time) => {
  if(!iso) return time? time : '';
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y, (m||1)-1, d||1);
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const mons=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const human = `${days[dt.getDay()]} ${d} ${mons[(m||1)-1]}`;
  return time? `${human} · ${time}` : human;
};
const slug = ()=>Math.random().toString(36).slice(2,8)+Math.random().toString(36).slice(2,6);
const initials = n => (n||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function toast(msg){
  const t=$('#toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._k);t._k=setTimeout(()=>t.classList.remove('show'),2200);
}

function seedEvent(){
  return {
    title:'', desc:'',
    dateISO:'', timeISO:'19:30', date:'', location:'',
    capacity:12, amountCents:500, visibility:'public', status:'open',
    slug:slug(), guestList:[],
    questions:[{ id:1, prompt:'Veg or non-veg?', type:'choice', multi:false, options:['Veg','Non-veg'] }],
  };
}

function render(){
  const app=$('#app'); app.innerHTML='';
  document.querySelectorAll('#roleSwitch button').forEach(b=>b.classList.toggle('on',b.dataset.view===App.view));
  if(App.view==='create') app.appendChild(CreateView());
  if(App.view==='dash')   app.appendChild(DashView());
  if(App.view==='guest')  app.appendChild(GuestView());
}

/* ---------- HOST: create / edit ---------- */
function CreateView(){
  if(!App.event) App.event = seedEvent();
  const ev = App.event;
  const node = el(`<div>
    <div class="eyebrow">Host</div>
    <h1 class="page">Create your event</h1>
    <p class="sub">Spots are confirmed only when a guest pays. Set it up once, share a link.</p>
    <div class="grid2" style="margin-top:22px">
      <div class="card pad" id="form"></div>
      <div class="share" id="sharePanel"></div>
    </div>
  </div>`);
  const form = node.querySelector('#form');
  form.appendChild(el(`<div style="margin-bottom:14px"><label class="fld">Event title</label>
      <input class="input" id="f-title" value="${esc(ev.title)}" placeholder="e.g. Rooftop Dinner"></div>`));
  form.appendChild(el(`<div style="margin-bottom:14px"><label class="fld">Description</label>
      <textarea class="input" id="f-desc" placeholder="e.g. Sunset, small plates, good people.">${esc(ev.desc)}</textarea></div>`));
  const r1=el(`<div class="row" style="margin-bottom:14px"></div>`);
  r1.appendChild(el(`<div><label class="fld">Date</label><input class="input" id="f-date" type="date" value="${esc(ev.dateISO||'')}"></div>`));
  r1.appendChild(el(`<div><label class="fld">Time</label><input class="input" id="f-time" type="time" value="${esc(ev.timeISO||'19:30')}"></div>`));
  form.appendChild(r1);
  form.appendChild(el(`<div style="margin-bottom:14px"><label class="fld">Location</label><input class="input" id="f-loc" value="${esc(ev.location)}" placeholder="e.g. Smitse"></div>`));
  const r2=el(`<div class="row" style="margin-bottom:14px"></div>`);
  r2.appendChild(el(`<div><label class="fld">Capacity (spots)</label><input class="input" id="f-cap" type="number" min="1" value="${ev.capacity}"></div>`));
  r2.appendChild(el(`<div><label class="fld">Contribution per spot (€)</label><input class="input" id="f-amt" type="number" min="0" step="0.5" value="${(ev.amountCents/100)}"></div>`));
  form.appendChild(r2);
  const vis=el(`<div style="margin-bottom:18px"><label class="fld">Link type</label>
      <div class="seg" id="f-vis">
        <button data-v="public" class="${ev.visibility==='public'?'on':''}">🌐 Public · auto-fills to capacity</button>
        <button data-v="private" class="${ev.visibility==='private'?'on':''}">✉️ Private · invite only</button>
      </div></div>`);
  const glWrap=el(`<div id="f-guestlist"></div>`);
  vis.querySelectorAll('button').forEach(b=>b.onclick=()=>{ev.visibility=b.dataset.v;vis.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));renderGuestList(glWrap,ev);});
  form.appendChild(vis);
  form.appendChild(glWrap);
  renderGuestList(glWrap, ev);
  form.appendChild(el(`<label class="fld">Guest questions <span style="color:var(--muted);font-weight:500">(up to 5)</span></label>`));
  const qWrap=el(`<div id="qwrap"></div>`); form.appendChild(qWrap);
  renderQuestions(qWrap, ev);
  const addBtn=el(`<button class="addq">+ Add question</button>`);
  addBtn.onclick=()=>{ if(ev.questions.length>=5){toast('Max 5 questions');return;}
    ev.questions.push({id:Date.now(),prompt:'',type:'text',multi:false,options:[]}); renderQuestions(qWrap,ev); };
  form.appendChild(addBtn);
  const save=el(`<button class="btn" style="margin-top:20px">Save & generate link</button>`);
  save.onclick=()=>{
    ev.title=$('#f-title').value||'Untitled event'; ev.desc=$('#f-desc').value;
    ev.dateISO=$('#f-date').value; ev.timeISO=$('#f-time')?$('#f-time').value:ev.timeISO;
    ev.location=$('#f-loc').value;
    ev.date=fmtDate(ev.dateISO, ev.timeISO);
    ev.capacity=Math.max(1,parseInt($('#f-cap').value)||1);
    ev.amountCents=Math.round(parseFloat($('#f-amt').value||0)*100);
    ev.guestList=(ev.guestList||[]).map(s=>(s||'').trim()).filter(Boolean);
    qWrap.querySelectorAll('[data-qid]').forEach(block=>{
      const q=ev.questions.find(x=>String(x.id)===block.dataset.qid);
      if(q){ q.prompt=block.querySelector('.q-prompt').value;
        if(q.type==='choice') q.options=[...block.querySelectorAll('.q-opt')].map(i=>i.value).filter(Boolean); }
    });
    ev.questions=ev.questions.filter(q=>q.prompt.trim());
    ev.status='open'; App.attendances=[];
    App.guestStep='view'; App.guestDraft={name:'',answers:{},chosen:null,verified:false};
    buildSharePanel(node.querySelector('#sharePanel')); toast('Event saved, link ready');
  };
  form.appendChild(save);
  buildSharePanel(node.querySelector('#sharePanel'));
  return node;
}

function renderQuestions(wrap, ev){
  wrap.innerHTML='';
  ev.questions.forEach(q=>{
    const block=el(`<div data-qid="${q.id}" style="border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:11px;background:#FCFBFF"></div>`);
    const top=el(`<div class="qrow"></div>`);
    const inp=el(`<input class="input q-prompt" placeholder="e.g. Veg or non-veg?" value="${esc(q.prompt)}">`);
    const del=el(`<button class="icon-btn" title="Remove">×</button>`);
    del.onclick=()=>{ev.questions=ev.questions.filter(x=>x!==q);renderQuestions(wrap,ev);};
    top.appendChild(inp);top.appendChild(del);block.appendChild(top);
    const seg=el(`<div class="seg" style="margin-bottom:8px">
        <button data-t="text" class="${q.type==='text'?'on':''}">Short text</button>
        <button data-t="choice" class="${q.type==='choice'?'on':''}">Multiple choice</button></div>`);
    const optBox=el(`<div class="opts"></div>`);
    function drawOpts(){
      optBox.innerHTML=''; if(q.type!=='choice') return;
      if(q.multi===undefined) q.multi=false;
      const mode=el(`<div class="seg" style="margin-bottom:10px">
          <button data-m="single" class="${!q.multi?'on':''}">Single answer</button>
          <button data-m="multiple" class="${q.multi?'on':''}">Multiple answers</button></div>`);
      mode.querySelectorAll('button').forEach(mb=>mb.onclick=()=>{q.multi=(mb.dataset.m==='multiple');mode.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===mb));});
      optBox.appendChild(mode);
      if(!q.options.length) q.options=['Option 1','Option 2'];
      q.options.forEach((o,i)=>{
        const line=el(`<div class="opt-line"></div>`);
        const oi=el(`<input class="input q-opt" value="${esc(o)}" placeholder="Option ${i+1}">`);
        oi.oninput=()=>q.options[i]=oi.value;
        const x=el(`<button class="icon-btn" style="width:34px;height:34px">×</button>`);
        x.onclick=()=>{q.options.splice(i,1);drawOpts();};
        line.appendChild(oi);line.appendChild(x);optBox.appendChild(line);
      });
      const add=el(`<button class="addq" style="font-size:12.5px">+ option</button>`);
      add.onclick=()=>{q.options.push('Option '+(q.options.length+1));drawOpts();};
      optBox.appendChild(add);
    }
    seg.querySelectorAll('button').forEach(b=>b.onclick=()=>{
      q.type=b.dataset.t;seg.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));drawOpts();});
    block.appendChild(seg);block.appendChild(optBox);drawOpts();
    wrap.appendChild(block);
  });
}

function renderGuestList(wrap, ev){
  wrap.innerHTML='';
  if(ev.visibility!=='private') return;
  if(!ev.guestList) ev.guestList=[];
  const box=el(`<div style="margin-bottom:18px"></div>`);
  box.appendChild(el(`<label class="fld">Guest list <span style="color:var(--muted);font-weight:500">(only these names can join)</span></label>`));
  const list=el(`<div class="opts"></div>`);
  function draw(){
    list.innerHTML='';
    if(!ev.guestList.length) ev.guestList=[''];
    ev.guestList.forEach((n,i)=>{
      const line=el(`<div class="opt-line"></div>`);
      const inp=el(`<input class="input" value="${esc(n)}" placeholder="Guest name">`);
      inp.oninput=()=>ev.guestList[i]=inp.value;
      const x=el(`<button class="icon-btn" style="width:34px;height:34px">×</button>`);
      x.onclick=()=>{ev.guestList.splice(i,1);draw();};
      line.appendChild(inp);line.appendChild(x);list.appendChild(line);
    });
    const add=el(`<button class="addq" style="font-size:12.5px">+ guest</button>`);
    add.onclick=()=>{ev.guestList.push('');draw();};
    list.appendChild(add);
  }
  draw();
  box.appendChild(list);
  wrap.appendChild(box);
}

function buildSharePanel(panel){
  const ev=App.event; panel.innerHTML='';
  const link = location.href.split('#')[0]+'#/e/'+ev.slug;
  const card=el(`<div class="card qr-box">
      <div class="eyebrow">Share this</div>
      <div id="qrcode"></div>
      <div class="linkpill"><span>🔗</span><span>${esc('virea.app/e/'+ev.slug)}</span></div>
      <button class="btn ghost sm" style="width:100%" id="copyLink">Copy guest link</button>
      <div class="cap-mini">
        <span><span class="pill ${ev.visibility==='public'?'pub':'priv'}">${ev.visibility==='public'?'Public':'Private'}</span></span>
        <span>${ev.capacity} spots · ${euros(ev.amountCents)} each</span>
      </div>
      <button class="btn sm" style="width:100%" id="goGuest">Open guest view →</button>
    </div>`);
  panel.appendChild(card);
  const holder=card.querySelector('#qrcode'); holder.innerHTML='';
  try{
    const qr=qrcode(0,'M'); qr.addData(link); qr.make();
    holder.innerHTML=qr.createSvgTag({cellSize:5,margin:1,scalable:true});
    const svg=holder.querySelector('svg');
    if(svg){svg.style.width='168px';svg.style.height='168px';
      svg.querySelectorAll('path,rect').forEach(p=>{const f=p.getAttribute('fill');if(f==='#000000'||f==='black')p.setAttribute('fill','#3B1A78');});}
  }catch(e){holder.textContent='QR';}
  card.querySelector('#copyLink').onclick=()=>{navigator.clipboard?.writeText(link).catch(()=>{});toast('Guest link copied');};
  card.querySelector('#goGuest').onclick=()=>{App.view='guest'; if(App.guestStep==='view') App.guestStep='ad'; render();};
}

/* ---------- GUEST: mobile flow ---------- */
function GuestView(){
  if(!App.event) return el(`<div class="card pad" style="text-align:center;color:var(--muted)">Create an event first (Host tab).</div>`);
  const ev=App.event;
  const taken=App.attendances.length;
  if(taken>=ev.capacity && App.guestStep!=='confirmed' && App.guestStep!=='ad') App.guestStep='full';
  const stage=el(`<div>
    <div class="eyebrow" style="text-align:center">Guest · mobile web · no app</div>
    <div class="phone-stage"><div class="phone"><div class="screen" id="screen"></div></div></div>
    <p class="demo-note">This is the page a guest opens from the link. A short ad plays first (this is how Virea earns from day one), then a mock payment, no real charge.</p>
  </div>`);
  const screen=stage.querySelector('#screen');
  if(App.guestStep==='ad'){ screen.appendChild(GuestAd(ev)); return stage; }
  if(App.guestStep==='full'){ screen.appendChild(GuestFull(ev)); return stage; }
  if(App.guestStep==='confirmed'){ screen.appendChild(GuestConfirmed(ev)); return stage; }
  if(App.guestStep==='paying'){ screen.appendChild(GuestPaying(ev)); return stage; }
  screen.appendChild(GuestForm(ev,taken));
  return stage;
}

/* Sponsored interstitial shown before the guest sees the event.
   Symbolises Virea's ad-supported revenue from day one. A close (x)
   appears after 3 seconds, then the guest continues to the event. */
function GuestAd(ev){
  const node=el(`<div class="ad-screen" id="adScreen">
      <button class="ad-x" id="adX" title="Skip ad" style="display:none">×</button>
      <div class="ad-badge">Sponsored</div>
      <div class="ad-art">
        <div class="ad-art-glow"></div>
        <div class="ad-art-mark">Ad</div>
      </div>
      <div class="ad-copy">Your event is loading…</div>
      <div class="ad-bar"><i id="adBar"></i></div>
      <div class="ad-foot">Ads like this keep Virea free for hosts and guests.</div>
    </div>`);
  // animate the progress bar over 3s, then reveal the close button
  setTimeout(()=>{ const b=node.querySelector('#adBar'); if(b) b.style.width='100%'; }, 30);
  const x=node.querySelector('#adX');
  const reveal=setTimeout(()=>{ if(x){ x.style.display='flex'; } }, 3000);
  x.onclick=()=>{ clearTimeout(reveal); App.guestStep='view'; render(); };
  return node;
}

      <span class="pill ${ev.visibility==='public'?'pub':'priv'}" style="background:rgba(255,255,255,.18);color:#fff">${ev.visibility==='public'?'Public event':'Private invite'}</span>
      <div class="ev-title">${esc(ev.title)}</div>
      <div class="ev-meta">${esc(ev.date)} · ${esc(ev.location)}</div>
      <div class="ev-meta" style="margin-top:6px;opacity:.85">${esc(ev.desc||'')}</div>

    body.appendChild(el(`<div class="qcard"><div class="qp">Private invite: confirm your name</div>
      <div style="font-size:12.5px;color:var(--muted);margin:-2px 0 0">Enter your name exactly as the host listed it.</div></div>`));
    const idCard=el(`<div class="guest-id"><div><label class="fld">Your name</label>
        <input class="input" id="g-name" placeholder="Your name" value="${esc(App.guestDraft.name||'')}"></div></div>`);
    body.appendChild(idCard);
    const err=el(`<div id="g-err" style="display:none;color:#DC2626;font-size:13px;font-weight:600;margin:8px 2px 0"></div>`);
    body.appendChild(err);
    const cont=el(`<button class="btn" style="margin-top:12px">Continue →</button>`);
    cont.onclick=()=>{
      const name=idCard.querySelector('#g-name').value.trim();
      if(!name){err.textContent='Please enter your name';err.style.display='block';return;}
      const match=(ev.guestList||[]).find(n=>n.toLowerCase()===name.toLowerCase());
      if(!match){err.textContent='Name not on guest list';err.style.display='block';return;}
      App.guestDraft.name=match; App.guestDraft.verified=true; render();
    };
    body.appendChild(cont);
    node.appendChild(body);
    return node;
  }
  const nameLocked = isPrivate && App.guestDraft.verified;
  body.appendChild(el(`<div class="guest-id"><div><label class="fld">Your name</label>
      <input class="input" id="g-name" placeholder="Alex" value="${esc(App.guestDraft.name)}" ${nameLocked?'readonly style="background:#F6F4FB;color:var(--ink-soft);cursor:not-allowed"':''}></div></div>`));
  ev.questions.forEach(q=>{
    const qc=el(`<div class="qcard" data-qid="${q.id}"></div>`);
    qc.appendChild(el(`<div class="qp">${esc(q.prompt)}</div>`));
    if(q.type==='choice'){
      const multi=!!q.multi;
      qc.appendChild(el(`<div style="font-size:12px;color:var(--muted);margin:-2px 0 8px">${multi?'Select all that apply':'Pick one'}</div>`));
      const sel = Array.isArray(App.guestDraft.answers[q.id]) ? App.guestDraft.answers[q.id] : (App.guestDraft.answers[q.id]=[]);
      const ch=el(`<div class="choices${multi?'':' single'}"></div>`);
      q.options.forEach(o=>{
        const b=el(`<button class="choice ${sel.includes(o)?'on':''}"><span class="tick"></span>${esc(o)}</button>`);
        b.onclick=()=>{
          if(multi){
            const i=sel.indexOf(o);
            if(i>=0) sel.splice(i,1); else sel.push(o);
          }else{
            sel.length=0; sel.push(o);
            ch.querySelectorAll('.choice').forEach(x=>x.classList.remove('on'));
          }
          b.classList.toggle('on', sel.includes(o));
        };
        ch.appendChild(b);
      });
      qc.appendChild(ch);
    }else{
      const t=el(`<input class="input" placeholder="Type your answer" value="${esc(App.guestDraft.answers[q.id]||'')}">`);
      t.oninput=()=>App.guestDraft.answers[q.id]=t.value; qc.appendChild(t);
    }
    body.appendChild(qc);
  });
  const pay=el(`<button class="btn" style="margin-top:6px">Pay ${euros(ev.amountCents)} · confirm my spot</button>`);
  pay.onclick=()=>{
    const name=node.querySelector('#g-name').value.trim();
    if(!name){toast('Add your name first');node.querySelector('#g-name').focus();return;}
    App.guestDraft.name=name;
    for(const q of ev.questions){ if(q.type==='choice'){const v=App.guestDraft.answers[q.id]; if(!Array.isArray(v)||!v.length){toast('Please answer: '+q.prompt);return;}} }
    App.guestStep='paying'; render(); setTimeout(commitAttendance, 1600);
  };
  body.appendChild(pay);
  body.appendChild(el(`<div class="lock">🔒 Secure checkout · <b>demo payment</b>, no real charge</div>`));
  node.appendChild(body);
  return node;
}

}

function GuestConfirmed(ev){
  const a=App.attendances[App.attendances.length-1]||{guestName:App.guestDraft.name};
  const node=el(`<div class="conf-screen">
    <div class="check"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#16A34A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="conf-title">You're in 🎉</div>
    <div class="conf-sub">Spot confirmed for <b>${esc(ev.title)}</b></div>
    <div class="receipt">
      <div class="ln"><span>Guest</span><b>${esc(a.guestName)}</b></div>
      <div class="ln"><span>Paid</span><b>${euros(ev.amountCents)}</b></div>
      <div class="ln"><span>When</span><b>${esc(ev.date)}</b></div>
      <div class="ln"><span>Where</span><b>${esc(ev.location)}</b></div>
    </div>
    <button class="btn ghost sm" style="margin-top:18px;width:100%" id="seeDash">See host dashboard →</button>
    <button class="btn sm" style="margin-top:8px;width:100%" id="another">Add another guest (demo)</button>
  </div>`);
  node.querySelector('#seeDash').onclick=()=>{App.view='dash';render();};
  node.querySelector('#another').onclick=()=>{App.guestStep='ad';App.guestDraft={name:'',answers:{},chosen:null,verified:false};render();};

}

function GuestFull(ev){
  const node=el(`<div class="full-screen">
    <div style="font-size:42px;margin-bottom:12px">🙌</div>
    <div class="conf-title">This event is full</div>
    <div class="conf-sub">All ${ev.capacity} spots at ${esc(ev.title)} are taken. Public links stop at capacity, no awkward over-asking.</div>
    <button class="btn ghost sm" style="width:100%" id="seeDash2">See who's going →</button>
  </div>`);
  node.querySelector('#seeDash2').onclick=()=>{App.view='dash';render();};
  return node;
}

/* the only way a guest enters the system: the (mock) payment succeeded */
function commitAttendance(){
  const ev=App.event;
  const answers={}; for(const k in App.guestDraft.answers){const v=App.guestDraft.answers[k]; answers[k]=Array.isArray(v)?v.slice():v;}
  const a={ id:slug(), guestName:App.guestDraft.name, answers,
    amountCents:ev.amountCents, at:Date.now(), fresh:true };
  App.attendances.push(a);
  if(App.attendances.length>=ev.capacity) ev.status='full';
  App.guestStep='confirmed'; render();
  toast(App.guestDraft.name+' just paid '+euros(ev.amountCents));
}

/* ---------- DASHBOARD: live host view ---------- */
function DashView(){
  if(!App.event) return el(`<div class="card pad" style="text-align:center;color:var(--muted)">Create an event first (Host tab).</div>`);
  const ev=App.event;
  const taken=App.attendances.length;
  const collected=App.attendances.reduce((s,a)=>s+a.amountCents,0);
  const pct=Math.min(100,Math.round(taken/ev.capacity*100));
  const node=el(`<div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px">
      <div>
        <div class="eyebrow">Host dashboard</div>
        <h1 class="page">${esc(ev.title)}</h1>
        <p class="sub">${esc(ev.date)} · ${esc(ev.location)} · <span class="pill ${ev.visibility==='public'?'pub':'priv'}">${ev.visibility==='public'?'Public':'Private'}</span></p>
      </div>
      <span class="live-tag"><span class="live-dot"></span>Live · updates every 2s</span>
    </div>
    <div class="stat-grid">
      <div class="card stat"><div class="k">Spots filled</div><div class="v">${taken}<small> / ${ev.capacity}</small></div>
        <div class="bar"><i style="width:${pct}%"></i></div></div>
      <div class="card stat"><div class="k">Collected</div><div class="v">${euros(collected)}</div>
        <div class="sub" style="margin-top:10px">of ${euros(ev.capacity*ev.amountCents)} potential</div></div>
      <div class="card stat"><div class="k">Status</div><div class="v" style="font-size:22px;margin-top:8px">
        ${ev.status==='full'?'<span style="color:var(--good)">● Full</span>':'<span style="color:var(--violet)">● Open</span>'}</div>
        <div class="sub" style="margin-top:8px">${ev.status==='full'?'Capacity reached':(ev.capacity-taken)+' spots left'}</div></div>
    </div>
    <div class="card" style="margin-top:10px;overflow:hidden">
      <div style="padding:16px 18px;border-bottom:1px solid var(--line);font-weight:700">Confirmed guests</div>
      <div id="tableHost"></div>
    </div>
  </div>`);
  const host=node.querySelector('#tableHost');
  if(!taken){
    host.appendChild(el(`<div class="empty"><div class="big">No paid RSVPs yet</div>Open the guest link and confirm a spot. This list updates live.</div>`));
  }else{
    const tbl=el(`<table><thead><tr><th>Guest</th>${ev.questions.map(q=>`<th>${esc(q.prompt)}</th>`).join('')}<th>Paid</th><th>Time</th></tr></thead><tbody></tbody></table>`);
    const tb=tbl.querySelector('tbody');
    App.attendances.forEach(a=>{
      const ans=ev.questions.map(q=>{
        const v=a.answers[q.id];
        const has=Array.isArray(v)?v.length:(v!=null&&v!=='');
        if(!has) return `<td><span style="color:var(--muted)">-</span></td>`;
        const vals=Array.isArray(v)?v:[v];
        return `<td>${vals.map(x=>`<span class="ans-tag">${esc(x)}</span>`).join(' ')}</td>`;
      }).join('');
      const tr=el(`<tr class="${a.fresh?'new-row':''}">
          <td><span class="avatar">${initials(a.guestName)}</span>${esc(a.guestName)}</td>
          ${ans}<td><b>${euros(a.amountCents)}</b></td>
          <td style="color:var(--muted)">${timeAgo(a.at)}</td></tr>`);
      tb.appendChild(tr); a.fresh=false;
    });
    host.appendChild(tbl);
  }
  return node;
}

function timeAgo(t){
  const s=Math.floor((Date.now()-t)/1000);
  if(s<5)return'just now'; if(s<60)return s+'s ago';
  return Math.floor(s/60)+'m ago';
}

/* dashboard re-renders every 2s - simulates polling a server */
function startPolling(){
  clearInterval(App.pollTimer);
  App.pollTimer=setInterval(()=>{ if(App.view==='dash') render(); },2000);
}

document.querySelectorAll('#roleSwitch button').forEach(b=>{ b.onclick=()=>{
  App.view=b.dataset.view;
  if(b.dataset.view==='guest' && (App.guestStep==='view')) App.guestStep='ad';
  render();
}; });
render();
startPolling();
</script>
</body>
</html>
